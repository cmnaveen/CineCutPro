name: CI

# Phase 0 quality gates (IMPLEMENTATION_PLAN.md §18, §19).
# Required gates: typecheck + unit tests + production build.
# Lint runs as an advisory step: the JS/JSX layer carries pre-existing debt
# (tracked separately); new TypeScript core code must stay lint-clean.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc — src/core)
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm run test

      - name: Production build (vite)
        run: npm run build

      - name: Lint (advisory — pre-existing JS debt)
        run: npm run lint
        continue-on-error: true

      - name: Lint the TS edit-engine core (must be clean)
        run: npx eslint "src/core/**/*.ts"
